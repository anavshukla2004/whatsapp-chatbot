services:
  - type: web
    name: whatsapp-chatbot
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/chatbot-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
    plan: free
